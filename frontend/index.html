<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTH VIEW -->
    <div id="auth-view" class="container">
        <div class="card">
            <h1>Task Manager</h1>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Min 8 characters">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
            </div>

            <div id="auth-message" class="message" style="display:none;"></div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" style="display:none;">
        <nav class="navbar">
            <span class="nav-brand">Task Manager</span>
            <div class="nav-right">
                <span id="user-email" class="user-email"></span>
                <button class="btn btn-outline" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <div class="container">

            <!-- Create Task -->
            <div class="card">
                <h2>Create New Task</h2>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task-title" placeholder="Task title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-description" placeholder="Optional description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="task-status">
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="handleCreateTask()">Add Task</button>
                <div id="task-message" class="message" style="display:none;"></div>
            </div>

            <!-- Task List -->
            <div class="card">
                <h2>My Tasks</h2>
                <div id="task-list">
                    <p class="loading">Loading tasks...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>Edit Task</h3>
            <input type="hidden" id="edit-task-id">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="edit-title">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="edit-description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="edit-status">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="handleUpdateTask()">Save</button>
                <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
